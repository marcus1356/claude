name: cuidado_integrado
description: >
  Aplicativo para conectar pessoas com deficiência, idosos e familiares
  a profissionais de saúde especializados.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Gerenciamento de estado reativo
  provider: ^6.1.1

  # Fontes personalizadas do Google para melhor legibilidade
  google_fonts: ^6.1.0

  # Construtor de formulários com validação integrada
  flutter_form_builder: ^9.2.1

  # Validadores prontos para formulários (email, senha, etc.)
  form_builder_validators: ^11.1.2

  # Armazenamento local de dados no dispositivo (chave-valor)
  # SharedPreferences salva dados simples (String, int, bool) no dispositivo.
  # Usamos para salvar a lista de usuários como JSON string.
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
