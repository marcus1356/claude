<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Marketing Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            min-height: 100vh;
        }
        .header {
            background: #16202a;
            border-bottom: 1px solid #2f3336;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.4rem; color: #1d9bf0; }
        .header .actions { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #1d9bf0; color: #fff; }
        .btn-secondary { background: #2f3336; color: #e7e9ea; }
        select {
            background: #2f3336;
            color: #e7e9ea;
            border: 1px solid #3e4144;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }

        /* Accounts bar */
        .accounts-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .account-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #2f3336;
            background: #16202a;
        }
        .account-chip .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
        }
        .account-chip .dot.active { background: #00ba7c; }
        .account-chip .dot.inactive { background: #71767b; }

        /* Platform colors */
        .platform-twitter { border-color: #1d9bf0; }
        .platform-linkedin { border-color: #0a66c2; }
        .platform-bluesky { border-color: #0085ff; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16202a;
            border: 1px solid #2f3336;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .number { font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
        .stat-card .label { color: #71767b; font-size: 0.85rem; }
        .stat-card.total .number { color: #1d9bf0; }
        .stat-card.posted .number { color: #00ba7c; }
        .stat-card.failed .number { color: #f4212e; }
        .stat-card.pending .number { color: #ffd400; }

        .posts-section h2 { font-size: 1.2rem; margin-bottom: 16px; color: #e7e9ea; }
        .post-card {
            background: #16202a;
            border: 1px solid #2f3336;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .post-card:hover { border-color: #1d9bf0; }
        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .platform-badge {
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-twitter { background: rgba(29,155,240,0.15); color: #1d9bf0; }
        .badge-linkedin { background: rgba(10,102,194,0.15); color: #0a66c2; }
        .badge-bluesky { background: rgba(0,133,255,0.15); color: #0085ff; }
        .account-label { color: #71767b; font-size: 0.8rem; }

        .post-content { font-size: 1rem; line-height: 1.5; margin-bottom: 12px; white-space: pre-wrap; }
        .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #71767b;
            font-size: 0.8rem;
        }
        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-posted { background: rgba(0,186,124,0.15); color: #00ba7c; }
        .status-failed { background: rgba(244,33,46,0.15); color: #f4212e; }
        .status-pending { background: rgba(255,212,0,0.15); color: #ffd400; }

        .empty-state { text-align: center; padding: 60px 20px; color: #71767b; }
        .empty-state p { font-size: 1.1rem; }

        .error-msg {
            color: #f4212e;
            font-size: 0.8rem;
            margin-top: 6px;
            font-style: italic;
        }
        .external-link {
            color: #1d9bf0;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .external-link:hover { text-decoration: underline; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #16202a;
            border: 1px solid #2f3336;
            border-radius: 16px;
            padding: 28px;
            width: 100%;
            max-width: 520px;
            margin: 20px;
        }
        .modal h3 { font-size: 1.1rem; margin-bottom: 6px; color: #e7e9ea; }
        .modal .trending-tags {
            display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
        }
        .modal .tag {
            background: rgba(29,155,240,0.1);
            color: #1d9bf0;
            border: 1px solid rgba(29,155,240,0.3);
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 0.75rem;
        }
        .modal textarea {
            width: 100%;
            background: #0f1419;
            border: 1px solid #2f3336;
            border-radius: 10px;
            color: #e7e9ea;
            font-size: 1rem;
            line-height: 1.5;
            padding: 14px;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
            margin-bottom: 8px;
        }
        .modal textarea:focus { outline: none; border-color: #1d9bf0; }
        .char-count { color: #71767b; font-size: 0.8rem; margin-bottom: 16px; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-loading { text-align: center; padding: 30px; color: #71767b; }
        .spinner {
            display: inline-block; width: 28px; height: 28px;
            border: 3px solid #2f3336; border-top-color: #1d9bf0;
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 600px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Marketing Agent</h1>
        <div class="actions">
            <select id="filterPlatform" onchange="loadData()">
                <option value="">Todas plataformas</option>
                <option value="twitter">Twitter</option>
                <option value="linkedin">LinkedIn</option>
                <option value="bluesky">Bluesky</option>
            </select>
            <select id="postAccount">
                <option value="">Todas contas</option>
            </select>
            <button class="btn btn-secondary" onclick="location.reload()">Atualizar</button>
            <button class="btn btn-secondary" id="btnGenerate" onclick="openGenerateModal()">✨ Gerar Conteúdo</button>
            <button class="btn btn-primary" id="btnPost" onclick="triggerPost()">Postar Agora</button>
        </div>
    </div>

    <div class="container">
        <div id="accountsBar" class="accounts-bar"></div>

        <div class="stats">
            <div class="stat-card total">
                <div class="number" id="statTotal">-</div>
                <div class="label">Total</div>
            </div>
            <div class="stat-card posted">
                <div class="number" id="statPosted">-</div>
                <div class="label">Publicados</div>
            </div>
            <div class="stat-card failed">
                <div class="number" id="statFailed">-</div>
                <div class="label">Falharam</div>
            </div>
            <div class="stat-card pending">
                <div class="number" id="statPending">-</div>
                <div class="label">Pendentes</div>
            </div>
        </div>

        <div class="posts-section">
            <h2>Posts Recentes</h2>
            <div id="postsContainer">
                <div class="empty-state"><p>Carregando...</p></div>
            </div>
        </div>
    </div>

    <!-- Generate Preview Modal -->
    <div class="modal-overlay" id="generateModal" onclick="closeModalOnOverlay(event)">
        <div class="modal">
            <h3>✨ Gerar Conteúdo</h3>
            <div id="modalBody">
                <div class="modal-loading">
                    <div class="spinner"></div>
                    <p>Buscando trends e gerando conteúdo...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE = window.location.origin;
        let accountsList = [];

        async function loadAccounts() {
            try {
                const res = await fetch(BASE + '/api/accounts');
                if (!res.ok) throw new Error('HTTP ' + res.status);
                const data = await res.json();
                accountsList = data.accounts || [];

                const bar = document.getElementById('accountsBar');
                bar.innerHTML = accountsList.map(a =>
                    '<div class="account-chip platform-' + a.platform + '">' +
                    '<span class="dot ' + (a.enabled ? 'active' : 'inactive') + '"></span>' +
                    a.name +
                    '</div>'
                ).join('');

                const select = document.getElementById('postAccount');
                var opts = '<option value="">Todas contas</option>';
                accountsList.filter(function(a){ return a.enabled; }).forEach(function(a){
                    opts += '<option value="' + a.name + '">' + a.name + ' (' + a.platform + ')</option>';
                });
                select.innerHTML = opts;
            } catch (e) {
                console.error('Failed to load accounts:', e);
                document.getElementById('accountsBar').innerHTML =
                    '<div class="account-chip" style="border-color:#f4212e;">Erro ao carregar contas: ' + e.message + '</div>';
            }
        }

        async function loadData() {
            try {
                var platform = document.getElementById('filterPlatform').value;
                var qs = platform ? '?platform=' + platform : '';

                var statsRes = await fetch(BASE + '/api/stats' + qs);
                var postsRes = await fetch(BASE + '/api/posts' + qs);

                if (!statsRes.ok) throw new Error('Stats HTTP ' + statsRes.status);
                if (!postsRes.ok) throw new Error('Posts HTTP ' + postsRes.status);

                var stats = await statsRes.json();
                var posts = await postsRes.json();

                document.getElementById('statTotal').textContent = stats.total;
                document.getElementById('statPosted').textContent = stats.posted;
                document.getElementById('statFailed').textContent = stats.failed;
                document.getElementById('statPending').textContent = stats.pending;

                var container = document.getElementById('postsContainer');
                if (posts.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>Nenhum post ainda. Clique em "Postar Agora" ou aguarde o agendamento diario.</p></div>';
                    return;
                }

                var html = '';
                for (var i = 0; i < posts.length; i++) {
                    var post = posts[i];
                    html += '<div class="post-card">';
                    html += '<div class="post-header">';
                    html += '<span class="platform-badge badge-' + post.platform + '">' + post.platform + '</span>';
                    html += '<span class="account-label">' + escapeHtml(post.account_name) + '</span>';
                    html += '</div>';
                    html += '<div class="post-content">' + escapeHtml(post.content) + '</div>';
                    html += '<div class="post-meta">';
                    html += '<span>' + formatDate(post.created_at) + '</span>';
                    html += '<div style="display:flex;align-items:center;gap:12px;">';
                    if (post.external_url) {
                        html += '<a class="external-link" href="' + escapeHtml(post.external_url) + '" target="_blank">Ver post &#8599;</a>';
                    }
                    html += '<span class="status-badge status-' + post.status + '">' + post.status + '</span>';
                    html += '</div></div>';
                    if (post.error_message) {
                        html += '<div class="error-msg">Erro: ' + escapeHtml(post.error_message) + '</div>';
                    }
                    html += '</div>';
                }
                container.innerHTML = html;
            } catch (e) {
                console.error('Failed to load data:', e);
                document.getElementById('postsContainer').innerHTML =
                    '<div class="empty-state"><p style="color:#f4212e;">Erro ao carregar dados: ' + e.message + '</p></div>';
            }
        }

        async function triggerPost() {
            var btn = document.getElementById('btnPost');
            var account = document.getElementById('postAccount').value;
            btn.disabled = true;
            btn.textContent = 'Gerando...';
            try {
                var qs = account ? '?account=' + encodeURIComponent(account) : '';
                var res = await fetch(BASE + '/api/post-now' + qs, { method: 'POST' });
                var data = await res.json();
                if (data.error) alert('Erro: ' + data.error);
                await loadData();
            } catch (e) {
                alert('Erro ao postar: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Postar Agora';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            var div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(iso) {
            if (!iso) return '';
            var d = new Date(iso + 'Z');
            return d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
        }

        async function openGenerateModal() {
            var modal = document.getElementById('generateModal');
            var body = document.getElementById('modalBody');
            modal.classList.add('open');
            body.innerHTML = '<div class="modal-loading"><div class="spinner"></div><p>Buscando trends e gerando conteúdo...</p></div>';

            try {
                var res = await fetch(BASE + '/api/generate-preview');
                var data = await res.json();
                if (data.error) throw new Error(data.error);

                var tags = (data.trending || []).map(function(t) {
                    return '<span class="tag">' + escapeHtml(t) + '</span>';
                }).join('');

                body.innerHTML =
                    (tags ? '<p style="color:#71767b;font-size:0.8rem;margin-bottom:8px;">Trending agora</p><div class="trending-tags">' + tags + '</div>' : '') +
                    '<p style="color:#71767b;font-size:0.8rem;margin-bottom:8px;">Conteúdo gerado</p>' +
                    '<textarea id="previewText" oninput="updateCharCount()">' + escapeHtmlAttr(data.content) + '</textarea>' +
                    '<div class="char-count"><span id="charCount">' + (data.content || '').length + '</span>/280 caracteres</div>' +
                    '<div class="modal-actions">' +
                    '<button class="btn btn-secondary" onclick="closeModal()">Fechar</button>' +
                    '<button class="btn btn-secondary" onclick="openGenerateModal()">Gerar outro</button>' +
                    '</div>';
            } catch (e) {
                body.innerHTML =
                    '<p style="color:#f4212e;margin-bottom:16px;">Erro: ' + escapeHtml(e.message) + '</p>' +
                    '<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Fechar</button></div>';
            }
        }

        function updateCharCount() {
            var txt = document.getElementById('previewText');
            var count = document.getElementById('charCount');
            if (txt && count) {
                count.textContent = txt.value.length;
                count.style.color = txt.value.length > 280 ? '#f4212e' : '#71767b';
            }
        }

        function closeModal() {
            document.getElementById('generateModal').classList.remove('open');
        }

        function closeModalOnOverlay(e) {
            if (e.target === document.getElementById('generateModal')) closeModal();
        }

        function escapeHtmlAttr(text) {
            if (!text) return '';
            return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        loadAccounts();
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
