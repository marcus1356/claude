<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Marketing Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            min-height: 100vh;
        }
        .header {
            background: #16202a;
            border-bottom: 1px solid #2f3336;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.4rem; color: #1d9bf0; }
        .header .actions { display: flex; gap: 12px; align-items: center; }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .btn-primary { background: #1d9bf0; color: #fff; }
        .btn-secondary { background: #2f3336; color: #e7e9ea; }
        select {
            background: #2f3336;
            color: #e7e9ea;
            border: 1px solid #3e4144;
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }

        /* Accounts bar */
        .accounts-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .account-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid #2f3336;
            background: #16202a;
        }
        .account-chip .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
        }
        .account-chip .dot.active { background: #00ba7c; }
        .account-chip .dot.inactive { background: #71767b; }

        /* Platform colors */
        .platform-twitter { border-color: #1d9bf0; }
        .platform-linkedin { border-color: #0a66c2; }
        .platform-bluesky { border-color: #0085ff; }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #16202a;
            border: 1px solid #2f3336;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .stat-card .number { font-size: 2rem; font-weight: 700; margin-bottom: 4px; }
        .stat-card .label { color: #71767b; font-size: 0.85rem; }
        .stat-card.total .number { color: #1d9bf0; }
        .stat-card.posted .number { color: #00ba7c; }
        .stat-card.failed .number { color: #f4212e; }
        .stat-card.pending .number { color: #ffd400; }

        .posts-section h2 { font-size: 1.2rem; margin-bottom: 16px; color: #e7e9ea; }
        .post-card {
            background: #16202a;
            border: 1px solid #2f3336;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .post-card:hover { border-color: #1d9bf0; }
        .post-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .platform-badge {
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-twitter { background: rgba(29,155,240,0.15); color: #1d9bf0; }
        .badge-linkedin { background: rgba(10,102,194,0.15); color: #0a66c2; }
        .badge-bluesky { background: rgba(0,133,255,0.15); color: #0085ff; }
        .account-label { color: #71767b; font-size: 0.8rem; }

        .post-content { font-size: 1rem; line-height: 1.5; margin-bottom: 12px; white-space: pre-wrap; }
        .post-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #71767b;
            font-size: 0.8rem;
        }
        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-posted { background: rgba(0,186,124,0.15); color: #00ba7c; }
        .status-failed { background: rgba(244,33,46,0.15); color: #f4212e; }
        .status-pending { background: rgba(255,212,0,0.15); color: #ffd400; }

        .empty-state { text-align: center; padding: 60px 20px; color: #71767b; }
        .empty-state p { font-size: 1.1rem; }

        .error-msg {
            color: #f4212e;
            font-size: 0.8rem;
            margin-top: 6px;
            font-style: italic;
        }
        .external-link {
            color: #1d9bf0;
            text-decoration: none;
            font-size: 0.8rem;
        }
        .external-link:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .header { padding: 16px 20px; flex-wrap: wrap; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AI Marketing Agent</h1>
        <div class="actions">
            <select id="filterPlatform" onchange="loadData()">
                <option value="">Todas plataformas</option>
                <option value="twitter">Twitter</option>
                <option value="linkedin">LinkedIn</option>
                <option value="bluesky">Bluesky</option>
            </select>
            <select id="postAccount">
                <option value="">Todas contas</option>
            </select>
            <button class="btn btn-secondary" onclick="location.reload()">Atualizar</button>
            <button class="btn btn-primary" id="btnPost" onclick="triggerPost()">Postar Agora</button>
        </div>
    </div>

    <div class="container">
        <div id="accountsBar" class="accounts-bar"></div>

        <div class="stats">
            <div class="stat-card total">
                <div class="number" id="statTotal">-</div>
                <div class="label">Total</div>
            </div>
            <div class="stat-card posted">
                <div class="number" id="statPosted">-</div>
                <div class="label">Publicados</div>
            </div>
            <div class="stat-card failed">
                <div class="number" id="statFailed">-</div>
                <div class="label">Falharam</div>
            </div>
            <div class="stat-card pending">
                <div class="number" id="statPending">-</div>
                <div class="label">Pendentes</div>
            </div>
        </div>

        <div class="posts-section">
            <h2>Posts Recentes</h2>
            <div id="postsContainer">
                <div class="empty-state"><p>Carregando...</p></div>
            </div>
        </div>
    </div>

    <script>
        let accountsList = [];

        async function loadAccounts() {
            try {
                const res = await fetch('/api/accounts');
                const data = await res.json();
                accountsList = data.accounts || [];

                const bar = document.getElementById('accountsBar');
                bar.innerHTML = accountsList.map(a => `
                    <div class="account-chip platform-${a.platform}">
                        <span class="dot ${a.enabled ? 'active' : 'inactive'}"></span>
                        ${a.name}
                    </div>
                `).join('');

                const select = document.getElementById('postAccount');
                select.innerHTML = '<option value="">Todas contas</option>' +
                    accountsList.filter(a => a.enabled).map(a =>
                        `<option value="${a.name}">${a.name} (${a.platform})</option>`
                    ).join('');
            } catch (e) {
                console.error('Failed to load accounts:', e);
            }
        }

        async function loadData() {
            try {
                const platform = document.getElementById('filterPlatform').value;
                const qs = platform ? `?platform=${platform}` : '';

                const [statsRes, postsRes] = await Promise.all([
                    fetch('/api/stats' + qs),
                    fetch('/api/posts' + qs)
                ]);
                const stats = await statsRes.json();
                const posts = await postsRes.json();

                document.getElementById('statTotal').textContent = stats.total;
                document.getElementById('statPosted').textContent = stats.posted;
                document.getElementById('statFailed').textContent = stats.failed;
                document.getElementById('statPending').textContent = stats.pending;

                const container = document.getElementById('postsContainer');
                if (posts.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>Nenhum post ainda. Clique em "Postar Agora" ou aguarde o agendamento diario.</p></div>';
                    return;
                }

                container.innerHTML = posts.map(post => `
                    <div class="post-card">
                        <div class="post-header">
                            <span class="platform-badge badge-${post.platform}">${post.platform}</span>
                            <span class="account-label">${escapeHtml(post.account_name)}</span>
                        </div>
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        <div class="post-meta">
                            <span>${formatDate(post.created_at)}</span>
                            <div style="display:flex;align-items:center;gap:12px;">
                                ${post.external_url ? `<a class="external-link" href="${escapeHtml(post.external_url)}" target="_blank">Ver post &#8599;</a>` : ''}
                                <span class="status-badge status-${post.status}">${post.status}</span>
                            </div>
                        </div>
                        ${post.error_message ? `<div class="error-msg">Erro: ${escapeHtml(post.error_message)}</div>` : ''}
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load data:', e);
            }
        }

        async function triggerPost() {
            const btn = document.getElementById('btnPost');
            const account = document.getElementById('postAccount').value;
            btn.disabled = true;
            btn.textContent = 'Gerando...';
            try {
                const qs = account ? `?account=${encodeURIComponent(account)}` : '';
                const res = await fetch('/api/post-now' + qs, { method: 'POST' });
                const data = await res.json();
                if (data.error) alert('Erro: ' + data.error);
                await loadData();
            } catch (e) {
                alert('Erro ao postar: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Postar Agora';
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(iso) {
            if (!iso) return '';
            const d = new Date(iso + 'Z');
            return d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
        }

        loadAccounts();
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
